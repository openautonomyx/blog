# Workflow for building and deploying the Astro site to GitHub Pages
name: Deploy Astro site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Restore Astro cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.astro
          key: ${{ runner.os }}-astro-${{ hashFiles('package.json') }}-${{ hashFiles('src/**', 'public/**', 'astro.config.*') }}
          restore-keys: |
            ${{ runner.os }}-astro-${{ hashFiles('package.json') }}-

      - name: Install dependencies
        run: npm install

      - name: Build with Astro
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
