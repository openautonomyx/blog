name: Publish Blog Post From Issue

on:
  issues:
    types:
      - labeled

permissions:
  contents: write
  issues: read

jobs:
  publish:
    if: contains(github.event.issue.labels.*.name, 'publish')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate MDX post
        env:
          ISSUE_EVENT_PATH: ${{ github.event_path }}
        run: node scripts/issue-to-post.mjs

      - name: Commit generated post
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add content/posts
          git commit -m "Publish blog post from issue #${{ github.event.issue.number }}" || echo "No changes to commit"
          git push
